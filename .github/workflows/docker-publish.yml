name: Build and Push Dev Container Image to GHCR

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Only apply 'latest' tag on version tags (v*.*.*), not on main branch pushes
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Version tags (v1.0.0, v1.1.0, etc.)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # Main branch gets 'main' tag (not 'latest')
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            # SHA for traceability
            type=sha,prefix=sha-,suffix=,format=short
            # Branch name for branch builds
            type=ref,event=branch
            # PR number for PR builds
            type=ref,event=pr

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64,amd64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
