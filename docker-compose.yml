# Compose file for pulling pre-built image from GitHub Container Registry
# This file pulls the pre-built image - no local build required
#
# Before using:
#   1. Replace 'your-username' with the actual GitHub username or organization
#      (e.g., ghcr.io/christophpitzl/pdf-processor:latest)
#   2. Copy .env.example to .env and configure your settings
#   3. Run: docker compose up -d
#
# The image will be pulled automatically from ghcr.io
#
# TAGGING STRATEGY:
# - 'latest': Stable production releases ONLY (updated on Git version tags like v1.0.0)
# - 'main': Latest main branch build (may be unstable, for testing)
# - 'v1.0.0', 'v1.1.0', etc.: Specific stable versions (recommended for production)
# - 'sha-xxxxx': Specific commit builds (for debugging)
# - 'develop', 'test': Branch-specific builds (for development/testing)
#
# PRODUCTION USE: Use specific version tags or 'latest' (stable releases only)
# TESTING: Use 'main' tag to get latest main branch builds
#
# To build locally instead, replace 'image:' with 'build: .'

services:
  pdf-processor:
    image: ghcr.io/your-username/pdf-processor:latest
    # RECOMMENDED FOR PRODUCTION: Use specific version tags
    # - ghcr.io/your-username/pdf-processor:v1.0.0  # specific stable version
    # - ghcr.io/your-username/pdf-processor:latest  # stable releases only (updated on version tags)
    # FOR TESTING: Use main branch tag
    # - ghcr.io/your-username/pdf-processor:main     # latest main branch (may be unstable)
    container_name: pdf-processor
    restart: unless-stopped
    environment:
       - WEBDAV_URL=${WEBDAV_URL:-http://nas.local/webdav}
       - WEBDAV_USERNAME=${WEBDAV_USERNAME}
       - WEBDAV_PASSWORD=${WEBDAV_PASSWORD}
       - WEBDAV_WATCH_FOLDER=${WEBDAV_WATCH_FOLDER:-/incoming}
       - WEBDAV_OUTPUT_FOLDER=${WEBDAV_OUTPUT_FOLDER:-/processed}
       - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://localhost:11434}
       - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3.5:0.8b}
       - SCAN_DATE_FORMAT=${SCAN_DATE_FORMAT:-%Y-%m-%d}
       - MIN_CONFIDENCE=${MIN_CONFIDENCE:-0.6}
       - FILENAME_PATTERN=${FILENAME_PATTERN:-{date}_{type}_{summary}.pdf}
       - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
       - LOG_LEVEL=${LOG_LEVEL:-INFO}
       - OLLAMA_WOL_ENABLED=${OLLAMA_WOL_ENABLED:-false}
       - OLLAMA_MAC_ADDRESS=${OLLAMA_MAC_ADDRESS}
       - OLLAMA_BROADCAST_HOST=${OLLAMA_BROADCAST_HOST:-[IP_ADDRESS]}
       - OLLAMA_WOL_PORT=${OLLAMA_WOL_PORT:-9}
       - OLLAMA_WOL_RETRIES=${OLLAMA_WOL_RETRIES:-10}
       - OLLAMA_WOL_RETRY_DELAY=${OLLAMA_WOL_RETRY_DELAY:-5.0}
       - WEB_HOST=${WEB_HOST:-[IP_ADDRESS]}
       - DATA_DIR=${DATA_DIR:-./data}
       - LOGS_DIR=${LOGS_DIR:-./logs}
    volumes:
       - ${DATA_DIR:-./data}:/app/data
       - ${LOGS_DIR:-./logs}:/app/logs
    ports:
       - "${WEB_PORT:-8080}:8080"
