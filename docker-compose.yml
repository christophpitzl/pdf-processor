# Compose file for pulling pre-built image from GitHub Container Registry
# This file pulls the pre-built image - no local build required
#
# Before using:
#   1. Copy .env.example to .env and configure your settings
#   2. Run: docker compose up -d
#
# The image will be pulled automatically from ghcr.io
# Image: ghcr.io/christophpitzl/pdf-processor:latest
#
# TAGGING STRATEGY:
# - 'latest': Stable production releases ONLY (updated on Git version tags like v1.0.0)
# - 'main': Latest main branch build (may be unstable, for testing)
# - 'v1.0.0', 'v1.1.0', etc.: Specific stable versions (recommended for production)
# - 'sha-xxxxx': Specific commit builds (for debugging)
# - 'develop', 'test': Branch-specific builds (for development/testing)
#
# PRODUCTION USE: Use specific version tags or 'latest' (stable releases only)
# TESTING: Use 'main' tag to get latest main branch builds
#
# To build locally instead, replace 'image:' with 'build: .'
#
# AUTOMATIC NFS MOUNTING:
# The container will automatically mount the NFS share at startup.
# Just provide NFS_SERVER and NFS_EXPORT_PATH in your .env file.
# No manual NFS mounting on the host is required.

services:
  pdf-processor:
    image: ghcr.io/christophpitzl/pdf-processor:latest
    # RECOMMENDED FOR PRODUCTION: Use specific version tags
    # - ghcr.io/christophpitzl/pdf-processor:v1.0.0  # specific stable version
    # - ghcr.io/christophpitzl/pdf-processor:latest  # stable releases only (updated on version tags)
    # FOR TESTING: Use main branch tag
    # - ghcr.io/christophpitzl/pdf-processor:main     # latest main branch (may be unstable)
    container_name: pdf-processor
    restart: unless-stopped
    privileged: true
    cap_add:
      - SYS_ADMIN
    # The container will automatically mount NFS at startup using the
    # NFS_SERVER and NFS_EXPORT_PATH environment variables.
    environment:
      # NFS configuration - container will mount automatically
      # User only needs to specify the NFS server details
      - NFS_SERVER=${NFS_SERVER}
      - NFS_EXPORT_PATH=${NFS_EXPORT_PATH}
      # Optional: subdirectory names inside the NFS export
      - NFS_INCOMING_SUBDIR=${NFS_INCOMING_SUBDIR:-/incoming}
      - NFS_PROCESSED_SUBDIR=${NFS_PROCESSED_SUBDIR:-/processed}
      # Optional: NFS mount options
      - NFS_MOUNT_OPTIONS=${NFS_MOUNT_OPTIONS:-hard,intr,noatime}
      # Ollama
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama.pitzl.net:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-granite4.1:3b}
      # Processing
      - SCAN_DATE_FORMAT=${SCAN_DATE_FORMAT:-%Y-%m-%d}
      - MIN_CONFIDENCE=${MIN_CONFIDENCE:-0.6}
      - FILENAME_PATTERN=${FILENAME_PATTERN:-{date}_{type}_{summary}.pdf}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-60}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # WOL
      - OLLAMA_WOL_ENABLED=${OLLAMA_WOL_ENABLED:-false}
      - OLLAMA_MAC_ADDRESS=${OLLAMA_MAC_ADDRESS}
      - OLLAMA_BROADCAST_HOST=${OLLAMA_BROADCAST_HOST:-[IP_ADDRESS]}
      - OLLAMA_WOL_PORT=${OLLAMA_WOL_PORT:-9}
      - OLLAMA_WOL_RETRIES=${OLLAMA_WOL_RETRIES:-10}
      - OLLAMA_WOL_RETRY_DELAY=${OLLAMA_WOL_RETRY_DELAY:-5.0}
      # Web server
      - WEB_HOST=${WEB_HOST:-[IP_ADDRESS]}
      - WEB_PORT=${WEB_PORT:-8080}
    volumes:
      # No local volume mounts needed - all data is on NFS
      # Container uses internal /app/data and /app/logs for temp storage
    ports:
      - "${WEB_PORT:-8080}:8080"
